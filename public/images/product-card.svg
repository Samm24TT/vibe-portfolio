<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d2c2c"/>
      <stop offset="100%" style="stop-color:#2c1f1f"/>
    </linearGradient>
  </defs>
  <!-- Browser chrome -->
  <rect width="800" height="500" rx="12" fill="#1e1e2e"/>
  <rect x="0" y="0" width="800" height="36" rx="12" fill="#2a2a3c"/>
  <rect x="0" y="20" width="800" height="16" fill="#2a2a3c"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <rect x="100" y="10" width="400" height="16" rx="8" fill="#3a3a4c"/>
  <!-- Content -->
  <rect x="0" y="36" width="800" height="464" rx="0 0 12 12" fill="url(#bg4)"/>
  <!-- Product card -->
  <rect x="180" y="80" width="440" height="320" rx="16" fill="#2a2a3c"/>
  <!-- Product image area -->
  <rect x="180" y="80" width="220" height="320" rx="16 0 0 16" fill="#5c4033"/>
  <!-- Perfume bottle shape -->
  <rect x="255" y="160" width="70" height="140" rx="8" fill="#8b6f47"/>
  <rect x="270" y="140" width="40" height="30" rx="4" fill="#a0845c"/>
  <rect x="280" y="120" width="20" height="25" rx="3" fill="#b8956a"/>
  <!-- Product info -->
  <rect x="420" y="110" width="80" height="14" rx="3" fill="white" opacity="0.4"/>
  <rect x="420" y="140" width="160" height="20" rx="4" fill="white" opacity="0.8"/>
  <rect x="420" y="175" width="170" height="8" rx="2" fill="white" opacity="0.3"/>
  <rect x="420" y="190" width="140" height="8" rx="2" fill="white" opacity="0.3"/>
  <!-- Price -->
  <rect x="420" y="230" width="60" height="24" rx="4" fill="#3d8b63" opacity="0.8"/>
  <rect x="490" y="235" width="50" height="12" rx="3" fill="white" opacity="0.3" style="text-decoration: line-through"/>
  <!-- Add to cart button -->
  <rect x="420" y="280" width="170" height="40" rx="8" fill="#3d8b63"/>
  <rect x="465" y="293" width="80" height="14" rx="3" fill="white" opacity="0.8"/>
  <text x="400" y="460" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="#a1a1aa">Product Preview Card</text>
</svg>
