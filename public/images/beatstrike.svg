<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Browser chrome -->
  <rect width="800" height="500" rx="12" fill="#1e1e2e"/>
  <rect x="0" y="0" width="800" height="36" rx="12" fill="#2a2a3c"/>
  <rect x="0" y="20" width="800" height="16" fill="#2a2a3c"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <rect x="100" y="10" width="400" height="16" rx="8" fill="#3a3a4c"/>
  <!-- Game content -->
  <rect x="0" y="36" width="800" height="464" rx="0 0 12 12" fill="url(#bg)"/>
  <!-- Beat circles -->
  <circle cx="400" cy="350" r="60" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.4"/>
  <circle cx="400" cy="350" r="40" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <circle cx="400" cy="350" r="20" fill="url(#accent)" opacity="0.8"/>
  <!-- Notes falling -->
  <circle cx="250" cy="150" r="18" fill="#a855f7" opacity="0.7"/>
  <circle cx="400" cy="120" r="18" fill="#3b82f6" opacity="0.7"/>
  <circle cx="550" cy="180" r="18" fill="#ec4899" opacity="0.7"/>
  <circle cx="320" cy="200" r="18" fill="#06b6d4" opacity="0.7"/>
  <circle cx="480" cy="160" r="18" fill="#a855f7" opacity="0.7"/>
  <!-- Title -->
  <text x="400" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="32" fill="white" opacity="0.9">BeatStrike</text>
  <text x="400" y="450" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="#a1a1aa">Browser Rhythm Game</text>
</svg>
