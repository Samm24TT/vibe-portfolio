<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4d5573"/>
      <stop offset="100%" style="stop-color:#2d3250"/>
    </linearGradient>
  </defs>
  <!-- Browser chrome -->
  <rect width="800" height="500" rx="12" fill="#1e1e2e"/>
  <rect x="0" y="0" width="800" height="36" rx="12" fill="#2a2a3c"/>
  <rect x="0" y="20" width="800" height="16" fill="#2a2a3c"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <rect x="100" y="10" width="400" height="16" rx="8" fill="#3a3a4c"/>
  <!-- Landing page content -->
  <rect x="0" y="36" width="800" height="464" rx="0 0 12 12" fill="url(#bg2)"/>
  <!-- Hero section -->
  <rect x="200" y="80" width="400" height="24" rx="4" fill="white" opacity="0.9"/>
  <rect x="250" y="115" width="300" height="12" rx="3" fill="white" opacity="0.5"/>
  <rect x="280" y="135" width="240" height="12" rx="3" fill="white" opacity="0.5"/>
  <!-- CTA buttons -->
  <rect x="300" y="170" width="100" height="36" rx="18" fill="#7b68ee"/>
  <rect x="410" y="170" width="100" height="36" rx="18" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <!-- Image placeholders -->
  <rect x="100" y="240" width="250" height="160" rx="8" fill="white" opacity="0.1"/>
  <rect x="450" y="240" width="250" height="160" rx="8" fill="white" opacity="0.1"/>
  <!-- Grid dots -->
  <circle cx="150" cy="440" r="3" fill="white" opacity="0.3"/>
  <circle cx="170" cy="440" r="3" fill="white" opacity="0.3"/>
  <circle cx="190" cy="440" r="3" fill="white" opacity="0.3"/>
  <text x="400" y="460" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="14" fill="#a1a1aa">Meet Landing Page</text>
</svg>
